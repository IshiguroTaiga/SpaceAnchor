version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "4040:4040"
    environment:
      - PORT=4040
      - JWT_SECRET=herta_genius_society_secret_access_protocol_13579
      - NODE_ENV=docker
    volumes:
      - ./backend:/app
      - /app/node_modules
    # Auto install missing modules in docker, run seeder and start
    command: sh -c "npm install && node seed_demo.js && npm start"

  frontend:
    build: ./frontend
    ports:
      - "5180:5180"
    environment:
      - VITE_BACKEND_URL=http://backend:4040
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # Auto install missing modules in docker, start Vite dev server on port 5180
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0 --port 5180"
